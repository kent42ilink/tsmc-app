<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>TSMC Vocabulary App PRO+</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  padding:20px;
}

.card{
  max-width:600px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
  margin-top:0;
}

.topbar{
  display:flex;
  gap:8px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#f0f0f0;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#ddd;
  transform:scale(1.02);
}

#q{
  font-size:18px;
  margin:15px 0;
}

.opt{
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#f7f7f7;
  cursor:pointer;
}

.opt:hover{
  background:#e9e9e9;
}

#status{
  margin-top:10px;
  font-weight:bold;
}

.badge{
  display:inline-block;
  padding:3px 8px;
  border-radius:8px;
  font-size:12px;
  margin-left:5px;
}

.good{background:#d1f7d6;color:#1b7a2a;}
.bad{background:#ffe1e1;color:#a10000;}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.box{
  width:85%;
  max-width:420px;
  background:white;
  padding:15px;
  border-radius:12px;
  max-height:70vh;
  overflow:auto;
}
</style>
</head>

<body>

<div class="card">
  <h2>TSMC Vocabulary PRO+</h2>

  <div class="topbar">
    <button onclick="toggleMode()">切換模式</button>
    <button onclick="openWrong()">錯題本</button>
    <button onclick="next()">下一題</button>
  </div>

  <div id="q"></div>
  <div id="opt"></div>
  <div id="status"></div>
</div>

<!-- 錯題彈窗 -->
<div class="modal" id="modal">
  <div class="box">
    <h3>錯題本</h3>
    <div id="wrongList"></div>
    <button onclick="clearWrong()">清空錯題</button>
    <button onclick="closeWrong()">關閉</button>
  </div>
</div>

<script>

/* ======================
   📚 單字庫
====================== */
const vocab = [
["ability","能力"],["abnormal","異常的"],["abort","中止"],
["adjust","調整"],["AI","人工智慧"],["alarm","警報"],
["area","區域"],["chip","晶片"],["clean","清潔"],
["control","控制"],["data","資料"],["error","錯誤"],
["factory","工廠"],["function","功能"],["job","工作"],
["mask","光罩"],["process","流程"],["product","產品"],
["system","系統"],["wafer","晶圓"]
];

/* ======================
   ⚙️ 狀態
====================== */
let mode="en2zh";
let cur=null;
let ans="";
let score = JSON.parse(localStorage.getItem("score")||"{}");

/* ======================
   🔁 錯題系統
====================== */
function saveWrong(q,a){
  let w = JSON.parse(localStorage.getItem("wrong")||"[]");
  w.push({q,a});
  localStorage.setItem("wrong",JSON.stringify(w));
}

/* ======================
   🧠 熟練度
====================== */
function mark(word, correct){
  if(!score[word]) score[word]={c:0,w:0};

  if(correct) score[word].c++;
  else score[word].w++;

  localStorage.setItem("score",JSON.stringify(score));
}

/* ======================
   🔀 題目
====================== */
function next(){

  cur = vocab[Math.floor(Math.random()*vocab.length)];

  let q = mode==="en2zh"?cur[0]:cur[1];
  ans = mode==="en2zh"?cur[1]:cur[0];

  document.getElementById("q").innerHTML =
    mode==="en2zh"
    ?"英文："+q+" → 中文？"
    :"中文："+q+" → 英文？";

  let opt=[ans];

  while(opt.length<4){
    let r=vocab[Math.floor(Math.random()*vocab.length)];
    let o = mode==="en2zh"?r[1]:r[0];
    if(!opt.includes(o)) opt.push(o);
  }

  opt.sort(()=>Math.random()-0.5);

  document.getElementById("opt").innerHTML =
    opt.map(o=>`
      <button class="opt" onclick="check('${o}')">
        ${o}
      </button>
    `).join("");
}

/* ======================
   ✔ 答案判斷
====================== */
function check(o){

  if(o===ans){
    document.getElementById("status").innerHTML=
      "✔ 正確 <span class='badge good'>GOOD</span>";

    mark(cur[0], true);
  }else{
    document.getElementById("status").innerHTML=
      "✘ 錯誤 <span class='badge bad'>WRONG</span>";

    saveWrong(cur[0]+" / "+cur[1], ans);
    mark(cur[0], false);
  }
}

/* ======================
   🔄 模式
====================== */
function toggleMode(){
  mode = mode==="en2zh"?"zh2en":"en2zh";
}

/* ======================
   ❌ 錯題本
====================== */
function openWrong(){
  let w = JSON.parse(localStorage.getItem("wrong")||"[]");

  document.getElementById("wrongList").innerHTML =
    w.slice(-30).reverse().map(x=>
      x.q+" → "+x.a
    ).join("<br>");

  document.getElementById("modal").style.display="flex";
}

function closeWrong(){
  document.getElementById("modal").style.display="none";
}

function clearWrong(){
  localStorage.removeItem("wrong");
  document.getElementById("wrongList").innerHTML="";
}

</script>

</body>
</html>
