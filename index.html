}

/* ===================== */
/* OPTION FIX (核心修復) */
/* ===================== */
.opt{

  padding:14px;
  border-radius:10px;
  border:none;
  background:#f7f7f7;
  font-size:18px;

}

/* 選中 */
.opt.selected{

}

/* 正確 */

  color:#fff;
}

/* 錯誤 */
.opt.wrong{

  color:#fff;
}

#status{
  margin-top:10px;
  font-weight:bold;
}

/* ===================== */
/* MODAL FIX */
/* ===================== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.box{
  width:92%;
  max-width:420px;
  background:#fff;
  padding:14px;
  border-radius:14px;
  max-height:70vh;
  overflow:auto;
}
</style>

/* =========================
   🔒 防呆（你要的）
========================= */
document.getElementById("debug").innerText =
"vocab length = " + vocab.length;

if(vocab.length !== 288){
  alert("❗題庫不是288，目前：" + vocab.length);
}

/* =========================
   state（計數 + 模式）
========================= */
let mode="en2zh";
let cur=null;
let ans="";
let correctCount=0;
let wrongCount=0;
let totalAsked=0;
let shuffle=[];      // 隨機出題順序
let shuffleIdx=0;    // 目前出到第幾題

/* =========================
   初始化：從 localStorage 讀取統計
========================= */
function loadStats(){
  let s = JSON.parse(localStorage.getItem("stats")||'{"correct":0,"wrong":0,"total":0}');
  correctCount=s.correct;
  wrongCount=s.wrong;
  totalAsked=s.total;
}
function saveStats(){
  localStorage.setItem("stats",JSON.stringify({correct:correctCount,wrong:wrongCount,total:totalAsked}));
}
loadStats();

/* =========================
   顯示統計
========================= */
function updateStats(){
  let remaining = vocab.length - shuffleIdx;
  if(remaining<0) remaining=0;
  document.getElementById("stats").innerHTML =
    "📊 總題數："+vocab.length+"　✅ 對："+correctCount+"　❌ 錯："+wrongCount+"　⏳ 剩下："+remaining;
}

/* =========================
   隨機顯示圖片（01.png ~ 40.png）
========================= */
function showImage(){
  let n = Math.floor(Math.random()*40)+1;
  let num = n.toString().padStart(2,"0");
  let img = document.getElementById("imgArea");
  img.innerHTML = `<img src="${num}.png" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='🖼'">`;
}

/* =========================
   建立隨機出題順序（Fisher-Yates）
========================= */
function buildShuffle(){
  shuffle = vocab.map((_,i)=>i);      // [0,1,2,...,287]
  for(let i=shuffle.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [shuffle[i],shuffle[j]] = [shuffle[j],shuffle[i]];
  }
  shuffleIdx = 0;
}
buildShuffle();

/* =========================
   題目（不重複，全部出完才重來）
========================= */
function next(){

  // 如果出完一輪，重新洗牌
  if(shuffleIdx >= vocab.length){
    buildShuffle();
  }

  cur = vocab[shuffle[shuffleIdx]];
  shuffleIdx++;

  showImage();  // 每題換一張隨機圖片

  let q = mode==="en2zh"?cur[0]:cur[1];
  ans = mode==="en2zh"?cur[1]:cur[0];

  document.getElementById("q").innerHTML =
    mode==="en2zh"
    ?"英文："+q+" → 中文？"
    :"中文："+q+" → 英文？";

  // 中英文混雜選項：正確答案在對應語言，干擾選項隨機取中/英文
  let opt=[ans];
  let allWords = vocab.flat(); // 所有中英文詞彙混合

  while(opt.length<4){
    let w = allWords[Math.floor(Math.random()*allWords.length)];
    if(!opt.includes(w)) opt.push(w);
  }

  opt.sort(()=>Math.random()-0.5);

  document.getElementById("opt").innerHTML =
    opt.map(o=>`
      <button class="opt" onclick="check(this,'${o}')">${o}</button>
    `).join("");

  document.getElementById("status").innerText="";
  updateStats();
}

/* =========================
   ✔ 修復：顏色 + 判斷 + 統計
========================= */
function check(btn,o){

  document.querySelectorAll(".opt")
    .forEach(b=>{
      b.classList.remove("selected","correct","wrong");
    });

  btn.classList.add("selected");

  if(o === ans){
    btn.classList.add("correct");
    document.getElementById("status").innerText="✔ 正確";
    correctCount++;
    totalAsked++;
  }else{
    btn.classList.add("wrong");
    document.getElementById("status").innerText="✘ 錯誤：" + ans;
    wrongCount++;
    totalAsked++;
    saveWrong(cur[0],cur[1]);
  }

  saveStats();
  updateStats();
}

/* =========================
   mode
========================= */
function toggleMode(){
  mode = mode==="en2zh"?"zh2en":"en2zh";
  document.getElementById("modeBtn").innerText =
    mode==="en2zh"?"英文 → 中文":"中文 → 英文";
}

/* =========================
   題庫
========================= */
function openDict(){
  document.getElementById("dict").style.display="flex";
  document.getElementById("dictList").innerHTML =
    vocab.map(x=>x[0]+" → "+x[1]).join("<br>");
}

function closeDict(){
  document.getElementById("dict").style.display="none";
}

/* =========================
   錯題（修復：不重複存入 + 清除按鈕）
========================= */

// 用 Set 存 key，避免同一題重複記錄
function wrongKey(a,b){
  return a+"|||"+b;
}

function saveWrong(a,b){
  let d = JSON.parse(localStorage.getItem("wrong")||"[]");
  let key = wrongKey(a,b);
  // 檢查是否已經存在
  let exists = d.some(x => wrongKey(x.a,x.b) === key);
  if(!exists){
    d.push({a,b});
    localStorage.setItem("wrong",JSON.stringify(d));
  }
}

function openWrong(){
  let d = JSON.parse(localStorage.getItem("wrong")||"[]");
  if(d.length===0){
    document.getElementById("wrongList").innerHTML = "<span style='color:#888;'>暫無錯題</span>";
  }else{
    document.getElementById("wrongList").innerHTML =
      d.map((x,i)=>(i+1)+". "+x.a+" → "+x.b).join("<br>");
  }
  document.getElementById("wrong").style.display="flex";
}

function closeWrong(){
  document.getElementById("wrong").style.display="none";
}

function clearWrong(){
  if(confirm("確定清除全部錯題紀錄？")){
    localStorage.setItem("wrong","[]");
    openWrong(); // 刷新顯示
  }
}
