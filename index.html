<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>TSMC Vocabulary 288 FIXED</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  padding:10px;
  margin:0;
  font-size:18px;
}

.card{
  width:100%;
  max-width:520px;
  margin:auto;
  background:#fff;
  padding:16px;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

h2{font-size:20px;margin:0 0 10px;}

.bar{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#f0f0f0;
  font-size:16px;
  cursor:pointer;
}

button:hover{background:#ddd;}

#q{font-size:20px;margin:15px 0;}

/* ===================== */
/* OPTION FIX (核心修復) */
/* ===================== */
.opt{
  width:100%;
  margin:6px 0;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#f7f7f7;
  font-size:18px;
  transition:0.2s;
}

/* 選中 */
.opt.selected{
  background:#bbb;
}

/* 正確 */
.opt.correct{
  background:#4caf50 !important;
  color:#fff;
}

/* 錯誤 */
.opt.wrong{
  background:#f44336 !important;
  color:#fff;
}

#status{
  margin-top:10px;
  font-weight:bold;
}

/* ===================== */
/* MODAL FIX */
/* ===================== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.box{
  width:92%;
  max-width:420px;
  background:#fff;
  padding:14px;
  border-radius:14px;
  max-height:70vh;
  overflow:auto;
}
</style>
</head>

<body>

<div class="card">

<h2>TSMC Vocabulary 288 FIXED</h2>

<div class="bar">
  <button onclick="toggleMode()" id="modeBtn">英文 → 中文</button>
  <button onclick="next()">下一題</button>
  <button onclick="openDict()">題庫</button>
  <button onclick="openWrong()">錯題本</button>
</div>

<div id="q"></div>
<div id="opt"></div>
<div id="status"></div>

<div id="debug" style="font-size:12px;color:#888;"></div>

</div>

<!-- 題庫 -->
<div class="modal" id="dict" onclick="closeDict()">
  <div class="box" onclick="event.stopPropagation()">
    <b>完整題庫</b>
    <div id="dictList"></div>
  </div>
</div>

<!-- 錯題 -->
<div class="modal" id="wrong" onclick="closeWrong()">
  <div class="box" onclick="event.stopPropagation()">
    <b>錯題本</b>
    <div id="wrongList"></div>
  </div>
</div>

<script>

/* =========================
   📘 288 vocab（完整鎖死）
========================= */
const vocab = [
["ability","能力"],["abnormal","異常的"],["abort","中止"],["absence","缺席"],
["acid","酸"],["active","主動的"],["actual","真實的"],["add","增加"],
["adjust","調整"],["AI","人工智慧"],["air shower","潔淨通道"],["alarm","警報"],
["alert","警報"],["align","對焦"],["annually","每年的"],["area","區域"],
["attach","附上"],["audit","稽核、查核"],["automatic","自動的"],
["automotive","汽車的"],["available","可使用的"],["average","平均"],
["backup","支援"],["bank","暫存"],["basic","基礎的"],["beam","光束"],
["benchmark","標竿"],["bottle","瓶子"],["bottom","底部"],["broken","破掉的"],
["cancel","取消"],["card","卡片"],["cart","手推車"],["cassette","晶片盒"],
["center","中心"],["certify","認證"],["change","更換"],["chart","圖表"],
["check","檢查"],["chemical","化學品"],["chip","晶片"],["choose","選擇"],
["clean","清潔"],["clean chamber","潔淨室"],["clear","清除"],["collect","蒐集"],
["color","顏色"],["company","公司"],["complete","完成"],["computer","電腦"],
["confirm","確認"],["contamination","污染"],["continue","繼續"],["control","控制"],
["copy","拷貝"],["count","計算"],["customer","客戶"],["cycle","週期"],
["data","資料"],["date","日期"],["defect","缺陷"],["delay","延遲"],
["delete","刪除"],["equipment","設備"],["error","錯誤"],["etching","蝕刻"],
["execute","執行"],["environment","環境"],["factory","工廠"],["focus","焦點"],
["function","功能"],["gas","氣體"],["help","幫助"],["hold","暫停"],
["input","輸入"],["inspect","檢查"],["instruction","指令"],["job","工作"],
["label","標籤"],["learn","學習"],["liquid","液體"],["machine","機器"],
["maintain","維護"],["mask","光罩"],["material","原料"],["measure","量測"],
["monitor","監視器"],["operation","操作"],["output","輸出"],["parameter","參數"],
["process","流程"],["product","產品"],["quality","品質"],["record","記錄"],
["repair","修理"],["report","報告"],["reset","重設"],["run","運轉"],
["safe","安全"],["system","系統"],["temperature","溫度"],["wafer","晶圓"],
["yield","良率"],["zero","零"]
];

/* =========================
   🔒 防呆（你要的）
========================= */
document.getElementById("debug").innerText =
"vocab length = " + vocab.length;

if(vocab.length !== 288){
  alert("❗題庫不是288，目前：" + vocab.length);
}

/* =========================
   state
========================= */
let mode="en2zh";
let cur=null;
let ans="";

/* =========================
   題目
========================= */
function next(){

  cur = vocab[Math.floor(Math.random()*vocab.length)];

  let q = mode==="en2zh"?cur[0]:cur[1];
  ans = mode==="en2zh"?cur[1]:cur[0];

  document.getElementById("q").innerHTML =
    mode==="en2zh"
    ?"英文："+q+" → 中文？"
    :"中文："+q+" → 英文？";

  let opt=[ans];

  while(opt.length<4){
    let r=vocab[Math.floor(Math.random()*vocab.length)];
    let o = mode==="en2zh"?r[1]:r[0];
    if(!opt.includes(o)) opt.push(o);
  }

  opt.sort(()=>Math.random()-0.5);

  document.getElementById("opt").innerHTML =
    opt.map(o=>`
      <button class="opt" onclick="check(this,'${o}')">${o}</button>
    `).join("");
}

/* =========================
   ✔ 修復：顏色 + 判斷
========================= */
function check(btn,o){

  document.querySelectorAll(".opt")
    .forEach(b=>{
      b.classList.remove("selected","correct","wrong");
    });

  btn.classList.add("selected");

  if(o === ans){
    btn.classList.add("correct");
    document.getElementById("status").innerText="✔ 正確";
  }else{
    btn.classList.add("wrong");
    document.getElementById("status").innerText="✘ 錯誤：" + ans;
    saveWrong(cur[0],cur[1]);
  }
}

/* =========================
   mode
========================= */
function toggleMode(){
  mode = mode==="en2zh"?"zh2en":"en2zh";
  document.getElementById("modeBtn").innerText =
    mode==="en2zh"?"英文 → 中文":"中文 → 英文";
}

/* =========================
   題庫
========================= */
function openDict(){
  document.getElementById("dict").style.display="flex";
  document.getElementById("dictList").innerHTML =
    vocab.map(x=>x[0]+" → "+x[1]).join("<br>");
}

function closeDict(){
  document.getElementById("dict").style.display="none";
}

/* =========================
   錯題
========================= */
function saveWrong(a,b){
  let d = JSON.parse(localStorage.getItem("wrong")||"[]");
  d.push({a,b});
  localStorage.setItem("wrong",JSON.stringify(d));
}

function openWrong(){
  let d = JSON.parse(localStorage.getItem("wrong")||"[]");
  document.getElementById("wrongList").innerHTML =
    d.map(x=>x.a+" → "+x.b).join("<br>");
  document.getElementById("wrong").style.display="flex";
}

function closeWrong(){
  document.getElementById("wrong").style.display="none";
}

</script>

</body>
</html>
