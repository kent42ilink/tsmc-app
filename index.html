<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>TSMC Vocabulary App PRO</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  padding:10px;
  margin:0;
  font-size:18px;
}

/* 卡片 */
.card{
  width:100%;
  max-width:520px;
  margin:auto;
  background:#fff;
  padding:16px;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* 標題 */
h2{
  font-size:22px;
  margin:0 0 10px 0;
}

/* 上方按鈕 */
.bar{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#f0f0f0;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#ddd;
}

/* 題目 */
#q{
  font-size:20px;
  margin:15px 0;
}

/* 選項 */
.opt{
  width:100%;
  margin:6px 0;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#f7f7f7;
  font-size:18px;
  transition:0.2s;
}

/* 選中效果 */
.opt.selected{
  background:#4caf50 !important;
  color:#fff;
}

/* 狀態 */
#status{
  margin-top:10px;
  font-weight:bold;
}

/* modal */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

/* 彈窗內容 */
.box{
  width:92%;
  max-width:420px;
  background:#fff;
  padding:14px;
  border-radius:14px;
  max-height:70vh;
  overflow:auto;
}

/* header */
.head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>TSMC Vocabulary App PRO</h2>

<div class="bar">
  <button id="modeBtn" onclick="toggleMode()">模式：英文 → 中文</button>
  <button onclick="openWrong()">錯題本</button>
  <button onclick="next()">下一題</button>
  <button onclick="clearSelect()">清除選擇</button>
</div>

<div id="q"></div>
<div id="opt"></div>
<div id="status"></div>

</div>

<!-- modal -->
<div class="modal" id="modal" onclick="bgClose(event)">
  <div class="box" onclick="event.stopPropagation()">

    <div class="head">
      <b>錯題本</b>
      <div>
        <button onclick="clearWrong()">清空</button>
        <button onclick="closeWrong()">✕</button>
      </div>
    </div>

    <div id="list"></div>

  </div>
</div>

<script>

/* ======================
   📚 單字庫
====================== */
const vocab = [
["ability","能力"],["abnormal","異常的"],["abort","中止"],
["adjust","調整"],["AI","人工智慧"],["alarm","警報"],
["area","區域"],["chip","晶片"],["clean","清潔"],
["control","控制"],["data","資料"],["error","錯誤"],
["factory","工廠"],["function","功能"],["job","工作"],
["mask","光罩"],["process","流程"],["product","產品"],
["system","系統"],["wafer","晶圓"]
];

/* ======================
   ⚙️ 狀態
====================== */
let mode="en2zh";
let cur=null;
let ans="";

/* ======================
   ❌ 錯題（去重）
====================== */
function saveWrong(q,a){
  let d = JSON.parse(localStorage.getItem("wrong")||"[]");

  if(d.find(x=>x.q===q && x.a===a)) return;

  d.push({q,a});
  localStorage.setItem("wrong",JSON.stringify(d));
}

/* ======================
   🔁 出題
====================== */
function next(){

  clearSelect();

  cur = vocab[Math.floor(Math.random()*vocab.length)];

  let q = mode==="en2zh"?cur[0]:cur[1];
  ans = mode==="en2zh"?cur[1]:cur[0];

  document.getElementById("q").innerHTML =
    mode==="en2zh"
    ?"英文："+q+" → 中文？"
    :"中文："+q+" → 英文？";

  let opt=[ans];

  while(opt.length<4){
    let r=vocab[Math.floor(Math.random()*vocab.length)];
    let o = mode==="en2zh"?r[1]:r[0];
    if(!opt.includes(o)) opt.push(o);
  }

  opt.sort(()=>Math.random()-0.5);

  document.getElementById("opt").innerHTML =
    opt.map(o=>`
      <button class="opt" onclick="check(this,'${o}')">${o}</button>
    `).join("");
}

/* ======================
   ✔ 選擇 + 停留效果
====================== */
function check(btn,o){

  document.querySelectorAll(".opt")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");

  if(o===ans){
    document.getElementById("status").innerText="✔ 正確";
    document.getElementById("status").style.color="green";
  }else{
    document.getElementById("status").innerText="✘ 錯誤："+ans;
    document.getElementById("status").style.color="red";

    saveWrong(cur[0]+" / "+cur[1],ans);
  }
}

/* ======================
   🔄 模式（完整顯示）
====================== */
function toggleMode(){
  mode = mode==="en2zh"?"zh2en":"en2zh";

  document.getElementById("modeBtn").innerText =
    mode==="en2zh"
    ?"模式：英文 → 中文"
    :"模式：中文 → 英文";
}

/* ======================
   🧹 清除選擇
====================== */
function clearSelect(){
  document.querySelectorAll(".opt")
    .forEach(b=>b.classList.remove("selected"));
}

/* ======================
   ❌ 錯題本
====================== */
function openWrong(){
  let d = JSON.parse(localStorage.getItem("wrong")||"[]");

  document.getElementById("list").innerHTML =
    d.slice(-40).reverse()
    .map(x=>x.q+" → "+x.a)
    .join("<br>");

  document.getElementById("modal").style.display="flex";
}

function closeWrong(){
  document.getElementById("modal").style.display="none";
}

function clearWrong(){
  localStorage.removeItem("wrong");
  document.getElementById("list").innerHTML="";
}

/* 點背景關閉 */
function bgClose(e){
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
